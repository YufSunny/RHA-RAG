services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ── API keys (REQUIRED — set in .env or shell) ──────────
      ZAI_API_KEY: ${ZAI_API_KEY}
      QWEN_API_KEY: ${QWEN_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # ── PostgreSQL (provided by the `db` service) ────────────
      PG_HOST: db
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: postgres

      # ── Model configuration (change if using different providers)
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-pro}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-v4}
      EMBED_BASE_URL: ${EMBED_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      OCR_MODEL: ${OCR_MODEL:-glm-ocr}

      # ── Optional ─────────────────────────────────────────────
      PORT: ${PORT:-8000}
      LLM_THINKING: ${LLM_THINKING:-true}
      LLM_REASONING_EFFORT: ${LLM_REASONING_EFFORT:-high}
      MAX_HISTORY_TURNS: 6
    volumes:
      - uploads_data:/app/uploads
      - local_data:/app/data/local
      - milvus_data:/app/milvus.db

volumes:
  pgdata:
  uploads_data:
  local_data:
  milvus_data:
