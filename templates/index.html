<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHA-RAG</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --orange: #d2991d;
    --purple: #a371f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; display: flex; line-height: 1.6;
  }

  /* ── Sidebar ── */
  aside {
    width: 280px; min-width: 280px; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    height: 100vh; overflow-y: auto;
  }
  aside h2 { padding: 16px 16px 8px; font-size: 14px; font-weight: 600; color: var(--accent); }
  #new-chat-btn {
    margin: 0 12px 8px; padding: 8px; background: var(--accent); color: #fff;
    border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  #new-chat-btn:hover { opacity: 0.85; }
  .upload-zone {
    margin: 0 12px 8px; border: 2px dashed var(--border); border-radius: 8px;
    padding: 12px; text-align: center; cursor: pointer; color: var(--muted); font-size: 12px;
  }
  .upload-zone:hover { border-color: var(--accent); color: var(--accent); }
  .upload-zone input { display: none; }
  .status-line { padding: 6px 16px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); }
  .status-line .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; }
  .dot.green { background: var(--green); } .dot.red { background: var(--red); } .dot.orange { background: var(--orange); }
  .sessions-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
  .session-item {
    padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-bottom: 2px;
    color: var(--muted); border: 1px solid transparent;
  }
  .session-item:hover { background: var(--bg); }
  .session-item:hover button { opacity: 1 !important; }
  .session-item.active { background: var(--bg); border-color: var(--border); color: var(--text); }
  .session-item .title { font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-item .meta { font-size: 11px; display: flex; justify-content: space-between; }

  /* ── Main chat ── */
  main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100vh; }
  .chat-header {
    padding: 10px 20px; border-bottom: 1px solid var(--border); font-size: 13px;
    color: var(--muted); flex-shrink: 0; display: flex; align-items: center; gap: 10px;
  }
  .chat-header .spacer { flex: 1; }
  #clear-btn {
    padding: 4px 10px; background: var(--surface); color: var(--muted);
    border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  #clear-btn:hover { color: var(--red); border-color: var(--red); }

  #chat {
    flex: 1; min-height: 0; overflow-y: auto; padding: 20px 28px;
  }
  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; color: var(--muted); gap: 12px; font-size: 15px; height: 100%;
  }
  .empty-state .big-icon { font-size: 48px; opacity: 0.4; }

  /* Chat bubbles */
  .msg-row { display: flex; margin-bottom: 16px; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }
  .msg-bubble {
    max-width: 85%; padding: 12px 16px; border-radius: 10px; font-size: 14px; line-height: 1.7;
    word-wrap: break-word; overflow-wrap: break-word; position: relative;
  }
  .msg-row.user .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 2px; }
  .msg-row.assistant .msg-bubble {
    background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 2px;
  }
  .msg-time { font-size: 11px; color: var(--muted); margin-top: 4px; padding: 0 4px; }
  .msg-row.user .msg-time { text-align: right; }
  .copy-btn {
    position: absolute; top: 6px; right: 8px; background: none; border: none;
    color: var(--muted); cursor: pointer; font-size: 12px; opacity: 0;
  }
  .msg-row.assistant .msg-bubble:hover .copy-btn { opacity: 1; }

  /* Collapsible pipeline detail */
  .pipeline-detail { margin-top: 8px; }
  .pipeline-detail summary { font-size: 11px; color: var(--muted); cursor: pointer; }
  .pipeline-node { margin: 4px 0; padding: 6px 10px; background: var(--bg); border-radius: 4px; font-size: 12px; line-height: 1.5; }
  .pipeline-node .pn-label { font-weight: 600; font-size: 10px; text-transform: uppercase; margin-bottom: 3px; }

  /* Rendered content inside bubbles */
  .assistant .msg-bubble p { margin: 0 0 0.8em; }
  .assistant .msg-bubble p:last-child { margin-bottom: 0; }
  .assistant .msg-bubble ul, .assistant .msg-bubble ol { margin: 0 0 0.8em; padding-left: 1.5em; }
  .assistant .msg-bubble li { margin: 0.25em 0; }
  .assistant .msg-bubble code {
    background: rgba(88,166,255,0.1); padding: 1px 4px; border-radius: 3px; font-size: 0.9em;
  }
  .assistant .msg-bubble pre {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 8px 12px; overflow-x: auto; margin: 0 0 0.8em; font-size: 0.85em;
  }
  .assistant .msg-bubble pre code { background: none; padding: 0; }
  .assistant .msg-bubble blockquote {
    border-left: 3px solid var(--accent); margin: 0 0 0.8em; padding: 2px 0 2px 12px; color: var(--muted);
  }

  /* KaTeX dark */
  .katex { color: var(--text); font-size: 1.05em; }
  .msg-row.user .katex { color: #fff; }
  .katex .mord, .katex .mbin, .katex .mrel { color: inherit; }

  /* Input */
  .chat-input {
    padding: 12px 20px; border-top: 1px solid var(--border); display: flex;
    gap: 8px; flex-shrink: 0; background: var(--bg); align-items: center;
  }
  .chat-input input {
    flex: 1; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; outline: none;
  }
  .chat-input input:focus { border-color: var(--accent); }
  .chat-input button {
    padding: 10px 18px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  #ask-btn { background: var(--accent); color: #fff; }
  #ask-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #stop-btn { background: var(--red); color: #fff; display: none; }
  #fast-btn {
    padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; font-weight: 600; color: var(--muted); background: var(--surface); cursor: pointer;
  }
  #fast-btn.fast { color: var(--green); border-color: var(--green); }

  /* Spinner */
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<aside>
  <h2>RHA-RAG</h2>
  <div style="display:flex;gap:6px;padding:0 12px;margin-bottom:8px">
    <button id="new-chat-btn" onclick="newChat()" style="flex:1">+ New chat</button>
    <button id="lang-btn" onclick="toggleLang()" style="padding:8px 10px;background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;font-weight:600">中</button>
  </div>
  <div class="upload-zone" id="upload-zone">
    + Drop files or click to upload
    <input type="file" id="file-input" multiple accept=".txt,.md,.html,.htm,.pdf,.jpg,.jpeg,.png,.docx">
  </div>
  <div class="sessions-list" id="sessions-list"></div>
  <div class="file-list" id="file-list" style="padding:4px 8px;font-size:11px;border-top:1px solid var(--border);max-height:30vh;overflow-y:auto"></div>
  <div class="status-line"><span class="dot orange" id="status-dot"></span> <span id="status-files">-</span> files · <span id="status-text">-</span></div>
</aside>

<main>
  <div class="chat-header">
    Pipeline: <span>clarify</span> &rarr; <span>retrieve</span> &rarr; <span>grade</span> &rarr; <span>reason</span> &rarr; <span>verify</span> &rarr; <span>answer</span>
    <span class="spacer"></span>
    <button id="clear-btn" onclick="clearChat()">Clear chat</button>
  </div>

  <div id="chat">
    <div class="empty-state" id="empty-state">
      <div class="big-icon">&#9670;</div>
      <div id="empty-init-text">Upload documents, then ask a research question</div>
    </div>
  </div>

  <div class="chat-input">
    <input type="text" id="question-input" placeholder="Ask a research question..." autofocus
           onkeydown="if(event.key==='Enter')ask()">
    <button id="fast-btn" onclick="toggleFast()">Full</button>
    <button id="stop-btn" onclick="stopGen()">Stop</button>
    <button id="ask-btn" onclick="ask()">Ask</button>
  </div>
</main>

<script>
let isStreaming = false;
let fastMode = false;
let currentAbort = null;
let sessionId = localStorage.getItem('rha_session_id');
if (!sessionId) { sessionId = crypto.randomUUID(); localStorage.setItem('rha_session_id', sessionId); }

// ── i18n ──────────────────────────────────────────────────────
const T = {
  en: {
    title: 'RHA-RAG',
    newChat: '+ New chat',
    upload: '+ Drop files or click to upload',
    placeholder: 'Ask a research question...',
    ask: 'Ask', stop: 'Stop', full: 'Full', fast: 'Fast',
    clear: 'Clear chat',
    pipeline: 'Pipeline:',
    emptyNew: 'New conversation',
    emptyInit: 'Upload documents, then ask a research question',
    emptyCleared: 'Conversation cleared',
    ready: 'Ready', noFiles: 'No files',
    filesLabel: 'files', filesAsk: 'file(s) — ask a question to index',
    thinking: 'Thinking...',
    pipelineSteps: n => 'Pipeline (' + n + ' steps)',
    copyTitle: 'Copy',
    fileDeleteTitle: 'Delete',
    generationStopped: 'Generation stopped.',
  },
  zh: {
    title: 'RHA-RAG',
    newChat: '+ 新对话',
    upload: '+ 拖放文件或点击上传',
    placeholder: '输入研究问题…',
    ask: '提问', stop: '停止', full: '完整', fast: '快速',
    clear: '清空对话',
    pipeline: '流水线：',
    emptyNew: '新对话',
    emptyInit: '上传文档，然后提出研究问题',
    emptyCleared: '对话已清空',
    ready: '就绪', noFiles: '无文件',
    filesLabel: '个文件', filesAsk: '个文件 — 提问以建立索引',
    thinking: '思考中…',
    pipelineSteps: n => '流水线（' + n + ' 步）',
    copyTitle: '复制',
    fileDeleteTitle: '删除',
    generationStopped: '生成已停止。',
  }
};
let lang = localStorage.getItem('rha_lang') || 'en';
function t(key, ...args) {
  const fn = (T[lang] || T.en)[key] || (T.en[key] || key);
  return typeof fn === 'function' ? fn(...args) : fn;
}
function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  localStorage.setItem('rha_lang', lang);
  document.getElementById('lang-btn').textContent = lang === 'en' ? '中' : 'EN';
  applyLang();
}
function applyLang() {
  document.getElementById('lang-btn').textContent = lang === 'en' ? '中' : 'EN';
  document.getElementById('new-chat-btn').textContent = t('newChat');
  document.getElementById('upload-zone').childNodes[0].textContent = t('upload');
  document.getElementById('question-input').placeholder = t('placeholder');
  document.getElementById('ask-btn').textContent = t('ask');
  document.getElementById('stop-btn').textContent = t('stop');
  document.getElementById('fast-btn').textContent = fastMode ? t('fast') : t('full');
  document.getElementById('clear-btn').textContent = t('clear');
  // sidebar title
  document.querySelector('aside h2').textContent = t('title');
  // pipeline header
  const hdr = document.querySelector('.chat-header');
  if (hdr) hdr.childNodes[0].textContent = t('pipeline') + ' ';
  const eit = document.getElementById('empty-init-text');
  if (eit) eit.textContent = t('emptyInit');
  refreshStatus();
}
document.addEventListener('DOMContentLoaded', applyLang);

function toggleFast() {
  fastMode = !fastMode;
  const btn = document.getElementById('fast-btn');
  btn.textContent = fastMode ? t('fast') : t('full');
  btn.classList.toggle('fast', fastMode);
}

// ── Markdown / LaTeX rendering ────────────────────────────────
function renderContent(text) {
  if (!text) return '';
  const placeholders = [];
  text = text.replace(/\$\$([\s\S]*?)\$\$/g, function(_, m) {
    placeholders.push(katex.renderToString(m.trim(), { displayMode: true, throwOnError: false }));
    return '\x01D' + (placeholders.length - 1) + '\x01';
  });
  text = text.replace(/\\\[([\s\S]*?)\\\]/g, function(_, m) {
    placeholders.push(katex.renderToString(m.trim(), { displayMode: true, throwOnError: false }));
    return '\x01D' + (placeholders.length - 1) + '\x01';
  });
  text = text.replace(/\\\((.+?)\\\)/g, function(_, m) {
    placeholders.push(katex.renderToString(m.trim(), { throwOnError: false }));
    return '\x01I' + (placeholders.length - 1) + '\x01';
  });
  text = text.replace(/\$(.+?)\$/g, function(_, m) {
    placeholders.push(katex.renderToString(m.trim(), { throwOnError: false }));
    return '\x01I' + (placeholders.length - 1) + '\x01';
  });
  let html = marked.parse(text);
  html = html.replace(/\x01D(\d+)\x01/g, function(_, idx) { return placeholders[idx]; });
  html = html.replace(/\x01I(\d+)\x01/g, function(_, idx) {
    return '<span class="katex-inline">' + placeholders[idx] + '</span>';
  });
  return html;
}

// ── Upload ────────────────────────────────────────────────────
const zone = document.getElementById('upload-zone');
const input = document.getElementById('file-input');
zone.addEventListener('click', () => input.click());
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); upload(e.dataTransfer.files); });
input.addEventListener('change', () => { if (input.files.length) upload(input.files); });

async function upload(fileList) {
  const form = new FormData();
  for (const f of fileList) form.append('files', f);
  await fetch('/api/upload', { method: 'POST', body: form });
  refreshStatus(); input.value = '';
}

// ── Status ────────────────────────────────────────────────────
async function refreshStatus() {
  const res = await fetch('/api/status');
  const s = await res.json();
  const dot = document.getElementById('status-dot'), txt = document.getElementById('status-text');
  dot.className = 'dot ' + (s.ready ? 'green' : s.missing_keys.length ? 'red' : 'orange');
  txt.textContent = s.ready ? t('ready') : s.files ? s.files + ' ' + t('filesLabel') : (s.errors.join('; ') || t('noFiles'));
  document.getElementById('status-files').textContent = s.files;
}

// ── Sessions list ─────────────────────────────────────────────
async function refreshSessions() {
  const res = await fetch('/api/sessions');
  const list = document.getElementById('sessions-list');
  const data = await res.json();
  if (!data.length) { list.innerHTML = ''; return; }
  list.innerHTML = data.map(s => {
    const cls = s.session_id === sessionId ? 'session-item active' : 'session-item';
    const preview = esc(s.last_preview || '').substring(0, 60);
    const time = s.updated_at ? new Date(s.updated_at).toLocaleTimeString() : '';
    return '<div class="' + cls + '" onclick="switchSession(\'' + esc(s.session_id) + '\')">' +
      '<div style="display:flex;align-items:center;gap:4px">' +
        '<div class="title" style="flex:1">' + preview + '</div>' +
        '<button onclick="delSession(\'' + esc(s.session_id) + '\',event)" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;opacity:0">&times;</button>' +
      '</div>' +
      '<div class="meta"><span>' + (s.messages / 2 | 0) + ' turns</span><span>' + time + '</span></div>' +
      '</div>';
  }).join('');
}

async function switchSession(id) {
  if (isStreaming || id === sessionId) return;
  sessionId = id; localStorage.setItem('rha_session_id', id);
  document.getElementById('chat').innerHTML = '';
  const res = await fetch('/api/sessions/' + encodeURIComponent(id));
  if (!res.ok) { refreshSessions(); return; }
  const msgs = await res.json();
  for (const m of msgs) {
    addMessage(m.role, m.content, m.created_at);
  }
  refreshSessions();
}

function newChat() {
  if (isStreaming) return;
  sessionId = crypto.randomUUID(); localStorage.setItem('rha_session_id', sessionId);
  document.getElementById('chat').innerHTML =
    '<div class="empty-state" id="empty-state"><div class="big-icon">&#9670;</div><div>' + t('emptyNew') + '</div></div>';
  refreshSessions();
}

function addMessage(role, content, timestamp, raw) {
  const chat = document.getElementById('chat');
  const empty = document.getElementById('empty-state'); if (empty) empty.remove();
  const timeStr = timestamp ? new Date(timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();

  const row = document.createElement('div');
  row.className = 'msg-row ' + role;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = raw ? content : renderContent(content);

  if (role === 'assistant') {
    const copy = document.createElement('button');
    copy.className = 'copy-btn'; copy.textContent = '📋'; copy.title = 'Copy';
    copy.onclick = function() { navigator.clipboard.writeText(content); };
    bubble.appendChild(copy);
  }

  row.appendChild(bubble);
  chat.appendChild(row);

  const timeDiv = document.createElement('div');
  timeDiv.className = 'msg-time'; timeDiv.textContent = timeStr;
  chat.appendChild(timeDiv);

  chat.scrollTop = chat.scrollHeight;
  return { row, bubble };
}

// ── Chat ──────────────────────────────────────────────────────
async function ask() {
  if (isStreaming) return;
  const input = document.getElementById('question-input');
  const q = input.value.trim();
  if (!q) return;

  isStreaming = true; input.value = '';
  document.getElementById('ask-btn').disabled = true;
  document.getElementById('stop-btn').style.display = '';
  const { row: qRow, bubble: qBubble } = addMessage('human', q);
  const { row: aRow, bubble: aBubble } = addMessage('assistant', '<span class="spinner"></span>' + t('thinking'), null, true);

  currentAbort = new AbortController();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, session_id: sessionId, fast: fastMode }),
      signal: currentAbort.signal,
    });

    const pipelineNodes = [];
    let answerContent = '';
    let streamDone = false;
    let detailEl = null;
    let detailSummary = null;
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (!streamDone) {
      const { value, done } = await reader.read();
      buffer += decoder.decode(value || new Uint8Array(), { stream: !done });
      if (done) buffer += decoder.decode();
      const lines = buffer.split('\n'); buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try { var event = JSON.parse(line.slice(6)); } catch (_) { continue; }
        if (event.node === 'done') { streamDone = true; break; }
        if (event.node === 'error') { aBubble.innerHTML = '<span style="color:var(--red)">Error: ' + esc(event.content) + '</span>'; streamDone = true; break; }
        if (event.node === 'generate_answer') answerContent = event.content;
        else if (event.node === 'generate_query' && event.content) answerContent = event.content;
        if (event.node === 'status') continue;

        pipelineNodes.push({ node: event.node, content: event.content });

        // Show intermediate nodes in real time inside a growing <details>.
        if (!detailEl) {
          detailEl = document.createElement('details');
          detailEl.className = 'pipeline-detail';
          detailEl.open = true;
          detailSummary = document.createElement('summary');
          detailEl.appendChild(detailSummary);
          aBubble.innerHTML = '';
          aBubble.appendChild(detailEl);
        }
        detailSummary.textContent = 'Pipeline — ' + esc(event.node);
        const div = document.createElement('div');
        div.className = 'pipeline-node';
        div.innerHTML = '<div class="pn-label">' + esc(event.node) + '</div>' + renderContent(event.content);
        detailEl.appendChild(div);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
      }
      if (done) break;
    }

    // Collapse the pipeline detail and show the final answer.
    if (detailEl) {
      detailEl.open = false;
      detailSummary.textContent = t('pipelineSteps', pipelineNodes.length);
    }
    aBubble.innerHTML = renderContent(answerContent || '(no answer)');
    const copy = document.createElement('button');
    copy.className = 'copy-btn'; copy.textContent = '📋'; copy.title = 'Copy';
    copy.onclick = function() { navigator.clipboard.writeText(answerContent); };
    aBubble.appendChild(copy);
    if (detailEl) aBubble.appendChild(detailEl);

  } catch (e) {
    if (e.name === 'AbortError') {
      aBubble.innerHTML = '<span style="color:var(--muted);font-style:italic">' + t('generationStopped') + '</span>';
    } else {
      aBubble.innerHTML = '<span style="color:var(--red)">Error: ' + esc(e.message) + '</span>';
    }
  } finally {
    isStreaming = false;
    currentAbort = null;
    document.getElementById('ask-btn').disabled = false;
    document.getElementById('stop-btn').style.display = 'none';
    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    refreshSessions(); refreshStatus();
  }
}

function stopGen() {
  if (currentAbort) currentAbort.abort();
}

async function clearChat() {
  if (isStreaming) return;
  await fetch('/api/clear', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: sessionId }),
  });
  document.getElementById('chat').innerHTML =
    '<div class="empty-state" id="empty-state"><div class="big-icon">&#9670;</div><div>' + t('emptyCleared') + '</div></div>';
  refreshSessions();
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s; return div.innerHTML;
}

// ── File list ─────────────────────────────────────────────────
async function refreshFiles() {
  const res = await fetch('/api/files');
  const list = document.getElementById('file-list');
  const data = await res.json();
  if (!data.length) { list.innerHTML = ''; return; }
  list.innerHTML = data.map(f =>
    '<div style="display:flex;align-items:center;gap:4px;padding:2px 0;color:var(--muted)">' +
      '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px" title="' + esc(f.name) + '">' + esc(f.name) + '</span>' +
      '<button onclick="delFile(\'' + esc(f.name) + '\')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;opacity:0.6">&times;</button>' +
    '</div>'
  ).join('');
}
async function delFile(name) {
  await fetch('/api/files/' + encodeURIComponent(name), { method: 'DELETE' });
  refreshFiles(); refreshStatus();
}

// ── Session delete ────────────────────────────────────────────
async function delSession(id, e) {
  e.stopPropagation();
  if (isStreaming) return;
  await fetch('/api/clear', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: id }),
  });
  if (id === sessionId) {
    sessionId = crypto.randomUUID(); localStorage.setItem('rha_session_id', sessionId);
    document.getElementById('chat').innerHTML =
      '<div class="empty-state" id="empty-state"><div class="big-icon">&#9670;</div><div>' + t('emptyNew') + '</div></div>';
  }
  refreshSessions();
}

// ── Init ──────────────────────────────────────────────────────
refreshStatus(); refreshFiles(); refreshSessions(); setInterval(refreshFiles, 5000);
</script>
